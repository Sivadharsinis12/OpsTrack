<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpsTrack Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ---------------- ROOT COLORS ---------------- */

:root{
    --primary:#2563eb;
    --primary-light:#3b82f6;
    --green:#22c55e;
    --orange:#f59e0b;
    --red:#ef4444;
    --gray-50:#f9fafb;
    --gray-100:#f3f4f6;
    --gray-200:#e5e7eb;
    --gray-300:#d1d5db;
    --gray-400:#9ca3af;
    --gray-600:#4b5563;
    --gray-800:#1f2937;
    --card-bg:#ffffff;
}

/* ---------------- GLOBAL ---------------- */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    background:var(--gray-100);
    display:flex;
    min-height:100vh;
}

/* ---------------- SIDEBAR ---------------- */

.sidebar{
    width:240px;
    background:white;
    border-right:1px solid var(--gray-200);
    padding:20px 0;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.logo{
    font-size:20px;
    font-weight:600;
    color:var(--primary);
    padding:0 20px 30px 20px;
}

.nav-item{
    padding:12px 20px;
    color:var(--gray-600);
    cursor:pointer;
    transition:.2s;
}

.nav-item:hover{
    background:var(--gray-100);
}

.nav-item.active{
    background:rgba(37,99,235,.1);
    color:var(--primary);
    font-weight:600;
    border-radius:6px;
    margin:0 10px;
}

/* ---------------- MAIN ---------------- */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ---------------- TOP BAR ---------------- */

.topbar{
    height:65px;
    background:white;
    border-bottom:1px solid var(--gray-200);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
}

.search{
    background:var(--gray-100);
    padding:10px 15px;
    border-radius:8px;
    width:350px;
    border:1px solid var(--gray-200);
}

.profile{
    display:flex;
    align-items:center;
    gap:10px;
}

/* ---------------- CONTENT ---------------- */

.content{
    padding:30px;
}

/* Header Section */

.header-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:24px;
    font-weight:600;
    color:var(--gray-800);
}

.subtitle{
    color:var(--gray-400);
    font-size:14px;
}

/* Stats Cards */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:24px;
    border-radius:14px;
    border:1px solid var(--gray-200);
}

.card h3{
    font-size:14px;
    color:var(--gray-400);
    margin-bottom:8px;
    font-weight:500;
}

.card .number{
    font-size:32px;
    font-weight:700;
    color:var(--gray-800);
}

/* Table Section */

.table-card{
    background:white;
    border-radius:14px;
    border:1px solid var(--gray-200);
    overflow:hidden;
}

.table-header{
    padding:20px;
    border-bottom:1px solid var(--gray-200);
}

.table-header h3{
    font-size:16px;
    font-weight:600;
    color:var(--gray-800);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:14px 20px;
    background:var(--gray-50);
    font-size:13px;
    font-weight:600;
    color:var(--gray-600);
    text-transform:uppercase;
}

td{
    padding:16px 20px;
    font-size:14px;
    color:var(--gray-800);
    border-bottom:1px solid var(--gray-100);
}

/* Priority Tags */

.priority{
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:500;
}

.priority.high{
    background:#fee2e2;
    color:#dc2626;
}

.priority.medium{
    background:#fef3c7;
    color:#d97706;
}

.priority.low{
    background:#d1fae5;
    color:#059669;
}

/* Status Tags */

.status{
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:500;
}

.status.status-open{
    background:#dbeafe;
    color:#2563eb;
}

.status.status-progress{
    background:#fef3c7;
    color:#d97706;
}

.status.status-resolved{
    background:#d1fae5;
    color:#059669;
}

/* Category Stats */

.category-stats{
    background:white;
    padding:24px;
    border-radius:14px;
    border:1px solid var(--gray-200);
    margin-top:20px;
}

.category-stats h3{
    font-size:16px;
    font-weight:600;
    color:var(--gray-800);
    margin-bottom:20px;
}

.progress{
    margin-bottom:16px;
}
 
.progress span{
    display:block;
    font-size:13px;
    color:var(--gray-600);
    margin-bottom:6px;
}

.progress-bar{
    height:8px;
    background:var(--gray-200);
    border-radius:4px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    border-radius:4px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div>
        <div class="logo">IssueTrack</div>
        <div class="nav-item active" onclick="window.location.href='dashboard.html'">Dashboard</div>
        <div class="nav-item" onclick="window.location.href='history.html'">History</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <input type="text" class="search" placeholder="Search issues...">
        <div class="profile">
            <span>Alex Henderson</span>
            <div style="width:36px;height:36px;background:var(--primary);border-radius:50%;"></div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- Header -->
        <div class="header-row">
            <div>
                <h1 class="title">Dashboard</h1>
                <p class="subtitle">Overview of all reported issues</p>
            </div>
            <div style="display:flex;gap:10px;">
                <button onclick="exportCSV()" style="background:white;color:var(--gray-600);padding:12px 20px;border-radius:8px;border:1px solid var(--gray-200);cursor:pointer;font-weight:500;">Export CSV</button>
                <button onclick="exportPDF()" style="background:white;color:var(--gray-600);padding:12px 20px;border-radius:8px;border:1px solid var(--gray-200);cursor:pointer;font-weight:500;">Export PDF</button>
                <button class="btn-primary" onclick="window.location.href='report.html'" style="background:var(--primary);color:white;padding:12px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:500;">+ Report Issue</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="card">
                <h3>Total Issues</h3>
                <div class="number" id="totalIssues">0</div>
            </div>
            <div class="card">
                <h3>Pending</h3>
                <div class="number" id="pendingIssues" style="color:var(--orange);">0</div>
            </div>
            <div class="card">
                <h3>Resolved</h3>
                <div class="number" id="resolvedIssues" style="color:var(--green);">0</div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-card">
            <div class="table-header">
                <h3>Recent Issues</h3>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Issue ID</th>
                        <th>Category</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="issueTable">
                </tbody>
            </table>
        </div>

        <!-- Category Stats -->
        <div class="category-stats">
            <h3>Issues by Category</h3>
            <div id="categoryContainer"></div>
        </div>

    </div>
</div>

<script>

/* -------- Load Issues from LocalStorage -------- */

let issues = JSON.parse(localStorage.getItem("opsTrack_issues")) || [];

/* If no issues exist, show empty dashboard */
if (!Array.isArray(issues)) {
    issues = [];
}

/* -------- Auto-resolve issues after 15 hours -------- */

function autoResolveOldIssues() {
    let updated = false;
    
    issues = issues.map(issue => {
        if (issue.status === "Pending" || issue.status === "In Progress") {
            // Parse the created date and time
            const createdDate = issue.dateCreated;
            const createdTime = issue.timeCreated;
            
            if (createdDate && createdTime) {
                // Create date object from stored date and time
                const dateTimeStr = createdDate + ' ' + createdTime;
                const createdDateTime = new Date(dateTimeStr);
                const now = new Date();
                
                // Calculate hours difference
                const hoursDiff = (now - createdDateTime) / (1000 * 60 * 60);
                
                // Auto-resolve if older than 15 hours
                if (hoursDiff >= 15) {
                    issue.status = "Resolved";
                    issue.dateClosed = new Date().toLocaleDateString();
                    issue.resolution = "Auto-resolved after 15 hours";
                    updated = true;
                }
            }
        }
        return issue;
    });
    
    if (updated) {
        localStorage.setItem("opsTrack_issues", JSON.stringify(issues));
    }
}

// Run auto-resolve on page load
autoResolveOldIssues();

/* -------- Calculate Stats -------- */

let total = issues.length;
let pending = 0;
let resolved = 0;

issues.forEach(issue => {
    if (issue.status === "Resolved") {
        resolved++;
    } else {
        pending++;
    }
});

/* -------- Update Cards -------- */

document.getElementById("totalIssues").innerText = total;
document.getElementById("pendingIssues").innerText = pending;
document.getElementById("resolvedIssues").innerText = resolved;

/* -------- Populate Table -------- */

let table = document.getElementById("issueTable");
table.innerHTML = "";

if (issues.length === 0) {
    table.innerHTML = "<tr><td colspan='5' style='text-align:center;padding:30px;color:#9ca3af;'>No issues submitted yet. Click 'Report an Issue' to add one.</td></tr>";
} else {
    issues.forEach(issue => {

        let statusClass =
            issue.status === "Resolved" ? "status-resolved" :
            issue.status === "In Progress" ? "status-progress" :
            "status-open";

        let row = `
            <tr>
                <td>${issue.id}</td>
                <td>${issue.category || "General"}</td>
                <td>
                    <span class="priority ${(issue.priority || "medium").toLowerCase()}">
                        ${issue.priority || "Medium"}
                    </span>
                </td>
                <td>
                    <span class="status ${statusClass}">
                        ${issue.status}
                    </span>
                </td>
                <td>${issue.timeCreated || new Date().toLocaleTimeString()}</td>
            </tr>
        `;

        table.innerHTML += row;
    });
}

/* -------- Category Stats -------- */

let categories = {};

issues.forEach(issue => {
    categories[issue.category] = (categories[issue.category] || 0) + 1;
});

let catContainer = document.getElementById("categoryContainer");
catContainer.innerHTML = "";

if (Object.keys(categories).length === 0) {
    catContainer.innerHTML = "<p style='color:#9ca3af;font-size:14px;'>No categories yet.</p>";
} else {
    Object.keys(categories).forEach(cat => {

        let percent = total === 0 ? 0 :
            Math.round((categories[cat] / total) * 100);

        catContainer.innerHTML += `
            <div class="progress">
                <div style="display:flex;justify-content:space-between;">
                    <span>${cat}</span>
                    <span>${percent}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"
                         style="width:${percent}%;background:var(--primary);">
                    </div>
                </div>
            </div>
        `;
    });
}

</script>
<script src="app.js"></script>
</body>
</html>
